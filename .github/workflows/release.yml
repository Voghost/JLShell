name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g. 1.0.0)'
        required: true
        default: '0.1.0'

jobs:
  # ── macOS ──────────────────────────────────────────────────────────────────
  build-mac:
    name: Build macOS
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Build fat jar + jlink macOS package
        run: |
          # Build fat jar with cross-platform natives
          mvn package -DskipTests -pl app -am -P dist -q

          JAR=app/target/app-0.1.0-SNAPSHOT.jar
          JDK=$JAVA_HOME
          MODULES="java.base,java.compiler,java.datatransfer,java.desktop,java.instrument,java.logging,java.management,java.management.rmi,java.naming,java.net.http,java.prefs,java.rmi,java.scripting,java.security.jgss,java.security.sasl,java.sql,java.transaction.xa,java.xml,java.xml.crypto,jdk.crypto.ec,jdk.crypto.cryptoki,jdk.jfr,jdk.management,jdk.naming.dns,jdk.net,jdk.unsupported,jdk.unsupported.desktop,jdk.zipfs"

          # jlink
          mkdir -p dist/mac-work/JLShell.app/Contents/{MacOS,Java,Resources,runtime}
          $JDK/bin/jlink \
            --module-path $JDK/jmods \
            --add-modules $MODULES \
            --output dist/mac-work/JLShell.app/Contents/runtime \
            --strip-debug --no-man-pages --no-header-files --compress zip-6

          cp $JAR dist/mac-work/JLShell.app/Contents/Java/app.jar

          # Info.plist
          cat > dist/mac-work/JLShell.app/Contents/Info.plist <<'PLIST'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0"><dict>
            <key>CFBundleName</key>             <string>JLShell</string>
            <key>CFBundleDisplayName</key>      <string>JLShell</string>
            <key>CFBundleIdentifier</key>       <string>com.jlshell.app</string>
            <key>CFBundleVersion</key>          <string>${{ github.event.inputs.version }}</string>
            <key>CFBundleShortVersionString</key><string>${{ github.event.inputs.version }}</string>
            <key>CFBundleExecutable</key>       <string>JLShell</string>
            <key>CFBundlePackageType</key>      <string>APPL</string>
            <key>NSHighResolutionCapable</key>  <true/>
            <key>NSSupportsAutomaticGraphicsSwitching</key><true/>
          </dict></plist>
          PLIST

          # Launcher
          cat > dist/mac-work/JLShell.app/Contents/MacOS/JLShell <<'LAUNCHER'
          #!/bin/bash
          DIR="$(cd "$(dirname "$0")/.." && pwd)"
          exec "$DIR/runtime/bin/java" \
            -Dapple.awt.application.name=JLShell \
            -Dapple.laf.useScreenMenuBar=true \
            --add-opens java.base/java.lang=ALL-UNNAMED \
            --add-opens java.desktop/sun.awt=ALL-UNNAMED \
            -jar "$DIR/Java/app.jar" "$@"
          LAUNCHER
          chmod +x dist/mac-work/JLShell.app/Contents/MacOS/JLShell

          # Zip
          mkdir -p dist
          cd dist/mac-work && zip -qr ../JLShell-${{ github.event.inputs.version }}-mac.zip JLShell.app

      - uses: actions/upload-artifact@v4
        with:
          name: mac-package
          path: dist/JLShell-${{ github.event.inputs.version }}-mac.zip

  # ── Linux ──────────────────────────────────────────────────────────────────
  build-linux:
    name: Build Linux
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Install zip
        run: sudo apt-get install -y zip

      - name: Build Linux package
        run: |
          mvn package -DskipTests -pl app -am -P dist -q

          JAR=app/target/app-0.1.0-SNAPSHOT.jar
          JDK=$JAVA_HOME
          MODULES="java.base,java.compiler,java.datatransfer,java.desktop,java.instrument,java.logging,java.management,java.management.rmi,java.naming,java.net.http,java.prefs,java.rmi,java.scripting,java.security.jgss,java.security.sasl,java.sql,java.transaction.xa,java.xml,java.xml.crypto,jdk.crypto.ec,jdk.crypto.cryptoki,jdk.jfr,jdk.management,jdk.naming.dns,jdk.net,jdk.unsupported,jdk.unsupported.desktop,jdk.zipfs"

          mkdir -p dist/linux-work/JLShell
          $JDK/bin/jlink \
            --module-path $JDK/jmods \
            --add-modules $MODULES \
            --output dist/linux-work/JLShell/runtime \
            --strip-debug --no-man-pages --no-header-files --compress zip-6

          cp $JAR dist/linux-work/JLShell/app.jar

          cat > dist/linux-work/JLShell/JLShell.sh <<'LAUNCHER'
          #!/bin/bash
          DIR="$(cd "$(dirname "$0")" && pwd)"
          exec "$DIR/runtime/bin/java" \
            --add-opens java.base/java.lang=ALL-UNNAMED \
            --add-opens java.desktop/sun.awt=ALL-UNNAMED \
            -jar "$DIR/app.jar" "$@"
          LAUNCHER
          chmod +x dist/linux-work/JLShell/JLShell.sh

          cat > dist/linux-work/JLShell/JLShell.desktop <<'DESKTOP'
          [Desktop Entry]
          Name=JLShell
          Comment=SSH Client
          Exec=/opt/jlshell/JLShell.sh
          Terminal=false
          Type=Application
          Categories=Network;
          DESKTOP

          mkdir -p dist
          cd dist/linux-work && tar czf ../JLShell-${{ github.event.inputs.version }}-linux.tar.gz JLShell

      - uses: actions/upload-artifact@v4
        with:
          name: linux-package
          path: dist/JLShell-${{ github.event.inputs.version }}-linux.tar.gz

  # ── Windows ────────────────────────────────────────────────────────────────
  build-windows:
    name: Build Windows
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Build Windows package
        shell: bash
        run: |
          mvn package -DskipTests -pl app -am -P dist -q

          JAR=app/target/app-0.1.0-SNAPSHOT.jar
          JDK=$JAVA_HOME
          MODULES="java.base,java.compiler,java.datatransfer,java.desktop,java.instrument,java.logging,java.management,java.management.rmi,java.naming,java.net.http,java.prefs,java.rmi,java.scripting,java.security.jgss,java.security.sasl,java.sql,java.transaction.xa,java.xml,java.xml.crypto,jdk.crypto.ec,jdk.crypto.cryptoki,jdk.jfr,jdk.management,jdk.naming.dns,jdk.net,jdk.unsupported,jdk.unsupported.desktop,jdk.zipfs"

          mkdir -p dist/win-work/JLShell
          "$JDK/bin/jlink" \
            --module-path "$JDK/jmods" \
            --add-modules $MODULES \
            --output dist/win-work/JLShell/runtime \
            --strip-debug --no-man-pages --no-header-files --compress zip-6

          cp $JAR dist/win-work/JLShell/app.jar

          cat > dist/win-work/JLShell/JLShell.bat <<'BAT'
          @echo off
          setlocal
          set DIR=%~dp0
          "%DIR%runtime\bin\java.exe" ^
            --add-opens java.base/java.lang=ALL-UNNAMED ^
            --add-opens java.desktop/sun.awt=ALL-UNNAMED ^
            -jar "%DIR%app.jar" %*
          BAT

          # VBScript wrapper: double-click with no console window
          cat > dist/win-work/JLShell/JLShell.vbs <<'VBS'
          Set oShell = CreateObject("WScript.Shell")
          sDir = Left(WScript.ScriptFullName, InStrRev(WScript.ScriptFullName, "\"))
          oShell.Run Chr(34) & sDir & "JLShell.bat" & Chr(34), 0, False
          VBS

          cd dist/win-work && 7z a -tzip ../JLShell-${{ github.event.inputs.version }}-win.zip JLShell

      - uses: actions/upload-artifact@v4
        with:
          name: win-package
          path: dist/JLShell-${{ github.event.inputs.version }}-win.zip

  # ── Create GitHub Release ──────────────────────────────────────────────────
  release:
    name: Create Release
    needs: [build-mac, build-linux, build-windows]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.event.inputs.version }}
          name: JLShell v${{ github.event.inputs.version }}
          draft: false
          prerelease: false
          generate_release_notes: true
          files: |
            artifacts/JLShell-${{ github.event.inputs.version }}-mac.zip
            artifacts/JLShell-${{ github.event.inputs.version }}-linux.tar.gz
            artifacts/JLShell-${{ github.event.inputs.version }}-win.zip
          body: |
            ## JLShell v${{ github.event.inputs.version }}

            ### 下载

            | 平台 | 文件 | 说明 |
            |------|------|------|
            | macOS | `JLShell-${{ github.event.inputs.version }}-mac.zip` | 解压后双击 `JLShell.app` |
            | Linux | `JLShell-${{ github.event.inputs.version }}-linux.tar.gz` | 解压后运行 `./JLShell.sh` |
            | Windows | `JLShell-${{ github.event.inputs.version }}-win.zip` | 解压后双击 `JLShell.vbs` |

            > 无需安装 JDK，JRE 已内置。
