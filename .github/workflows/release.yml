name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g. 1.0.0)'
        required: true
        default: '0.1.0'

env:
  VERSION: ${{ github.event.inputs.version }}
  JAR: app/target/app-0.1.0-SNAPSHOT.jar
  MODULES: "java.base,java.compiler,java.datatransfer,java.desktop,java.instrument,java.logging,java.management,java.management.rmi,java.naming,java.net.http,java.prefs,java.rmi,java.scripting,java.security.jgss,java.security.sasl,java.sql,java.transaction.xa,java.xml,java.xml.crypto,jdk.crypto.ec,jdk.crypto.cryptoki,jdk.jfr,jdk.management,jdk.naming.dns,jdk.net,jdk.unsupported,jdk.unsupported.desktop,jdk.zipfs,javafx.base,javafx.controls,javafx.fxml,javafx.graphics,javafx.swing"

jobs:
  # ── macOS ───────────────────────────────────────────────────────────────────
  build-mac:
    name: Build macOS (arm64 + x64)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'liberica'
          java-package: 'jdk+fx'
          cache: maven

      - name: Build
        run: |
          mvn package -DskipTests -pl app -am -q

          JDK=$JAVA_HOME
          mkdir -p dist/mac-work/JLShell.app/Contents/{MacOS,Java,Resources}

          $JDK/bin/jlink \
            --module-path $JDK/jmods \
            --add-modules $MODULES \
            --output dist/mac-work/JLShell.app/Contents/runtime \
            --strip-debug --no-man-pages --no-header-files --compress zip-6

          cp $JAR dist/mac-work/JLShell.app/Contents/Java/app.jar

          cat > dist/mac-work/JLShell.app/Contents/Info.plist <<PLIST
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0"><dict>
            <key>CFBundleName</key>             <string>JLShell</string>
            <key>CFBundleDisplayName</key>      <string>JLShell</string>
            <key>CFBundleIdentifier</key>       <string>com.jlshell.app</string>
            <key>CFBundleVersion</key>          <string>${VERSION}</string>
            <key>CFBundleShortVersionString</key><string>${VERSION}</string>
            <key>CFBundleExecutable</key>       <string>JLShell</string>
            <key>CFBundlePackageType</key>      <string>APPL</string>
            <key>NSHighResolutionCapable</key>  <true/>
            <key>NSSupportsAutomaticGraphicsSwitching</key><true/>
          </dict></plist>
          PLIST

          cat > dist/mac-work/JLShell.app/Contents/MacOS/JLShell <<'LAUNCHER'
          #!/bin/bash
          DIR="$(cd "$(dirname "$0")/.." && pwd)"
          exec "$DIR/runtime/bin/java" \
            -Dapple.awt.application.name=JLShell \
            -Dapple.laf.useScreenMenuBar=true \
            --add-opens java.base/java.lang=ALL-UNNAMED \
            --add-opens java.desktop/sun.awt=ALL-UNNAMED \
            -jar "$DIR/Java/app.jar" "$@"
          LAUNCHER
          chmod +x dist/mac-work/JLShell.app/Contents/MacOS/JLShell

          cd dist/mac-work && zip -qr ../JLShell-${VERSION}-mac.zip JLShell.app

      - uses: actions/upload-artifact@v4
        with:
          name: mac-package
          path: dist/JLShell-${{ env.VERSION }}-mac.zip

  # ── Linux ───────────────────────────────────────────────────────────────────
  build-linux:
    name: Build Linux (tar.gz + deb + AppImage)
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'liberica'
          java-package: 'jdk+fx'
          cache: maven

      - name: Install tools
        run: |
          sudo apt-get update -q
          sudo apt-get install -y fakeroot dpkg-dev imagemagick

      - name: Build fat jar + jlink runtime
        run: |
          mvn package -DskipTests -pl app -am -q

          JDK=$JAVA_HOME
          mkdir -p dist
          $JDK/bin/jlink \
            --module-path $JDK/jmods \
            --add-modules $MODULES \
            --output dist/runtime \
            --strip-debug --no-man-pages --no-header-files --compress zip-6

          cp $JAR dist/app.jar

      # ── tar.gz ──────────────────────────────────────────────────────────────
      - name: Package tar.gz
        run: |
          mkdir -p dist/linux-work/JLShell
          cp -r dist/runtime dist/linux-work/JLShell/
          cp dist/app.jar dist/linux-work/JLShell/

          cat > dist/linux-work/JLShell/JLShell.sh <<'EOF'
          #!/bin/bash
          DIR="$(cd "$(dirname "$0")" && pwd)"
          exec "$DIR/runtime/bin/java" \
            --add-opens java.base/java.lang=ALL-UNNAMED \
            --add-opens java.desktop/sun.awt=ALL-UNNAMED \
            -jar "$DIR/app.jar" "$@"
          EOF
          chmod +x dist/linux-work/JLShell/JLShell.sh

          cd dist/linux-work && tar czf ../JLShell-${VERSION}-linux-x64.tar.gz JLShell

      # ── .deb ────────────────────────────────────────────────────────────────
      - name: Package .deb
        run: |
          PKG=dist/deb-work
          mkdir -p $PKG/opt/jlshell
          mkdir -p $PKG/usr/share/applications
          mkdir -p $PKG/usr/share/pixmaps
          mkdir -p $PKG/usr/bin
          mkdir -p $PKG/DEBIAN

          cp -r dist/runtime $PKG/opt/jlshell/
          cp dist/app.jar $PKG/opt/jlshell/

          cat > $PKG/opt/jlshell/JLShell.sh <<'EOF'
          #!/bin/bash
          DIR="$(cd "$(dirname "$0")" && pwd)"
          exec "$DIR/runtime/bin/java" \
            --add-opens java.base/java.lang=ALL-UNNAMED \
            --add-opens java.desktop/sun.awt=ALL-UNNAMED \
            -jar "$DIR/app.jar" "$@"
          EOF
          chmod +x $PKG/opt/jlshell/JLShell.sh

          # Symlink in /usr/bin
          ln -s /opt/jlshell/JLShell.sh $PKG/usr/bin/jlshell

          # .desktop
          cat > $PKG/usr/share/applications/jlshell.desktop <<EOF
          [Desktop Entry]
          Name=JLShell
          Comment=SSH Client
          Exec=/opt/jlshell/JLShell.sh
          Icon=jlshell
          Terminal=false
          Type=Application
          Categories=Network;System;
          EOF

          # Icon (simple placeholder PNG via ImageMagick)
          convert -size 64x64 xc:'#0f172a' -fill '#38bdf8' \
            -draw "roundrectangle 8,8 56,56 8,8" \
            $PKG/usr/share/pixmaps/jlshell.png 2>/dev/null || true

          # DEBIAN/control
          INSTALLED_SIZE=$(du -sk $PKG/opt/jlshell | cut -f1)
          cat > $PKG/DEBIAN/control <<EOF
          Package: jlshell
          Version: ${VERSION}
          Architecture: amd64
          Maintainer: JLShell <noreply@jlshell.com>
          Installed-Size: ${INSTALLED_SIZE}
          Description: JLShell SSH Client
           A modern SSH client with SFTP browser and plugin support.
          Section: net
          Priority: optional
          EOF

          fakeroot dpkg-deb --build $PKG dist/JLShell-${VERSION}-linux-x64.deb

      # ── AppImage ─────────────────────────────────────────────────────────────
      - name: Package AppImage
        run: |
          # Download appimagetool and extract it (GitHub Actions runners lack FUSE)
          wget -q https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage \
            -O /tmp/appimagetool.AppImage
          chmod +x /tmp/appimagetool.AppImage
          /tmp/appimagetool.AppImage --appimage-extract 2>/dev/null
          APPIMAGETOOL="$(pwd)/squashfs-root/AppRun"

          APPDIR=dist/appimage-work/JLShell.AppDir
          mkdir -p $APPDIR/usr/{bin,lib,share/applications,share/pixmaps}

          cp -r dist/runtime $APPDIR/usr/
          cp dist/app.jar $APPDIR/usr/

          # AppRun
          printf '#!/bin/bash\nHERE="$(cd "$(dirname "$0")" && pwd)"\nexec "$HERE/usr/runtime/bin/java" \\\n  --add-opens java.base/java.lang=ALL-UNNAMED \\\n  --add-opens java.desktop/sun.awt=ALL-UNNAMED \\\n  -jar "$HERE/usr/app.jar" "$@"\n' > $APPDIR/AppRun
          chmod +x $APPDIR/AppRun

          # .desktop (required by AppImage)
          printf '[Desktop Entry]\nName=JLShell\nExec=AppRun\nIcon=jlshell\nType=Application\nCategories=Network;\n' > $APPDIR/jlshell.desktop

          # Icon (required by AppImage)
          cp dist/deb-work/usr/share/pixmaps/jlshell.png $APPDIR/jlshell.png

          ARCH=x86_64 "$APPIMAGETOOL" --no-appstream $APPDIR \
            dist/JLShell-${VERSION}-linux-x86_64.AppImage 2>&1

      - uses: actions/upload-artifact@v4
        with:
          name: linux-packages
          path: |
            dist/JLShell-${{ env.VERSION }}-linux-x64.tar.gz
            dist/JLShell-${{ env.VERSION }}-linux-x64.deb
            dist/JLShell-${{ env.VERSION }}-linux-x86_64.AppImage

  # ── Windows ─────────────────────────────────────────────────────────────────
  build-windows:
    name: Build Windows (zip + portable exe)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'liberica'
          java-package: 'jdk+fx'
          cache: maven

      - name: Build fat jar + jlink runtime
        shell: bash
        run: |
          mvn package -DskipTests -pl app -am -q

          JDK=$JAVA_HOME
          mkdir -p dist/app-input
          "$JDK/bin/jlink" \
            --module-path "$JDK/jmods" \
            --add-modules $MODULES \
            --output dist/runtime \
            --strip-debug --no-man-pages --no-header-files --compress zip-6

          cp $JAR dist/app-input/app.jar

      # ── zip + portable exe (7-Zip SFX) ──────────────────────────────────────
      - name: Package zip + portable exe
        shell: bash
        run: |
          # Assemble portable layout (flat — no JLShell/ subdir, easier for SFX)
          mkdir -p dist/win-work
          cp -r dist/runtime dist/win-work/
          cp dist/app-input/app.jar dist/win-work/

          # Launcher: no console window via javaw
          cat > dist/win-work/JLShell.bat << 'BAT'
@echo off
setlocal
set DIR=%~dp0
start "" "%DIR%runtime\bin\javaw.exe" ^
  --add-opens java.base/java.lang=ALL-UNNAMED ^
  --add-opens java.desktop/sun.awt=ALL-UNNAMED ^
  -jar "%DIR%app.jar"
BAT

          # ZIP (portable — extract anywhere, double-click JLShell.bat)
          cd dist/win-work && 7z a -tzip "../JLShell-${VERSION}-win-x64.zip" . && cd ../..

          # ── Portable EXE via 7-Zip SFX ──────────────────────────────────────
          # Get 7-Zip SFX stub (not bundled with standard 7-Zip install)
          curl -fsSL "https://7-zip.org/a/7z2409-extra.7z" -o /tmp/7zextra.7z
          7z e /tmp/7zextra.7z -o/tmp/7zextra/ 7zSD.sfx -y

          # SFX config: extract to %LOCALAPPDATA%\JLShell\<version>, skip if exists, then run
          printf ';!@Install@!UTF-8!\nTitle="JLShell %s"\nExtractPathVariable=LOCALAPPDATA\nExtractPath=JLShell\\%s\nOverwriteMode=2\nRunProgram="JLShell.bat"\nGUIMode=2\n;!@InstallEnd@!' \
            "${VERSION}" "${VERSION}" > /tmp/sfx.cfg

          # Combine: sfx stub + config + zip archive = single portable exe
          cat /tmp/7zextra/7zSD.sfx /tmp/sfx.cfg "dist/JLShell-${VERSION}-win-x64.zip" \
            > "dist/JLShell-${VERSION}-win-x64.exe"

      - uses: actions/upload-artifact@v4
        with:
          name: win-packages
          path: |
            dist/JLShell-${{ env.VERSION }}-win-x64.zip
            dist/JLShell-${{ env.VERSION }}-win-x64.exe

  # ── Create GitHub Release ────────────────────────────────────────────────────
  release:
    name: Create Release
    needs: [build-mac, build-linux, build-windows]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ env.VERSION }}
          name: JLShell v${{ env.VERSION }}
          draft: false
          prerelease: false
          generate_release_notes: true
          files: |
            artifacts/JLShell-${{ env.VERSION }}-mac.zip
            artifacts/JLShell-${{ env.VERSION }}-linux-x64.tar.gz
            artifacts/JLShell-${{ env.VERSION }}-linux-x64.deb
            artifacts/JLShell-${{ env.VERSION }}-linux-x86_64.AppImage
            artifacts/JLShell-${{ env.VERSION }}-win-x64.zip
            artifacts/JLShell-${{ env.VERSION }}-win-x64.exe
          body: |
            ## JLShell v${{ env.VERSION }}

            ### 下载

            | 平台 | 文件 | 说明 |
            |------|------|------|
            | macOS | `JLShell-${{ env.VERSION }}-mac.zip` | 解压后双击 `JLShell.app` |
            | Linux | `JLShell-${{ env.VERSION }}-linux-x64.tar.gz` | 解压后运行 `./JLShell.sh` |
            | Linux | `JLShell-${{ env.VERSION }}-linux-x64.deb` | `sudo dpkg -i` 安装，命令行 `jlshell` |
            | Linux | `JLShell-${{ env.VERSION }}-linux-x86_64.AppImage` | `chmod +x` 后直接运行 |
            | Windows | `JLShell-${{ env.VERSION }}-win-x64.exe` | 双击安装（推荐） |
            | Windows | `JLShell-${{ env.VERSION }}-win-x64.zip` | 解压后双击 `JLShell.vbs` |

            > 所有包均内置精简 JRE，无需安装 JDK。
